- name: Get list of VMs for a specific config ID
  hosts: localhost
  collections:
    - fortinet.fortiflexvm

  tasks:

    - name: Include variables from a file
      include_vars:
        file: env_vars.yaml

    - name: Get VMs list
      fortinet.fortiflexvm.fortiflexvm_vms_list_info:
        username: "{{ username }}"
        password: "{{ password }}"
        configId: 4818
      register: result

    - name: Display response
      debug:
        var: result.vms


