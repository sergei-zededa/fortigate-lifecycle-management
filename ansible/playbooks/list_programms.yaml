- name: Get list of VM Programs for the account
  hosts: localhost

  collections:
    - fortinet.fortiflexvm

  tasks:

    - name: Include variables from a file
      include_vars:
        file: env_vars.yaml
        name: myenv

    - name: Get programs list
      fortinet.fortiflexvm.fortiflexvm_programs_list_info:
        username: "{{ myenv.username }}"
        password: "{{ myenv.password }}"
      register: result

    - name: Display response
      debug:
        var: result.programs
