- name: Get list of fortiflexvm_groups_list_info
  hosts: localhost
  collections:
    - fortinet.fortiflexvm

  tasks:

    - name: Include variables from a file
      include_vars:
        file: env_vars.yaml

    - name: Get group list
      fortinet.fortiflexvm.fortiflexvm_groups_list_info:
        username: "{{ username }}"
        password: "{{ password }}"
        #configId: 4818
      register: result

    - name: Display response
      debug:
        var: result.groups


